type: dnf
repos:
  copr:
    - atim/starship
install:
  packages:
    # Shell & prompt
    - starship
    - tmux
    - fish

    # File manager
    - yazi

    # Text editors
    - micro
    - neovim

    # System monitor / info
    - btop
    - fastfetch
    - inxi

    # Network TUI tools
    - NetworkManager-tui
    - irssi
    - nmap

    # Misc utilities
    - bat
    - eza
    - fd-find
    - ripgrep
    - fzf
    - zoxide
    - tealdeer
    - jq
    - unzip
    - wget
    - curl

    # Audio TUI
    - pulsemixer

    # Audio stack
    - pipewire
    - pipewire-pulse
    - pipewire-alsa
    - wireplumber

    # Login manager
    - greetd
    - greetd-tuigreet
